<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',system-ui,sans-serif">
  <defs>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1A2233" flood-opacity="0.10"/>
    </filter>
    <filter id="panel" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#1A2233" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F7BFF"/>
      <stop offset="1" stop-color="#3358E0"/>
    </linearGradient>
    <linearGradient id="oldbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5AA9FF"/>
      <stop offset="1" stop-color="#2F86E0"/>
    </linearGradient>
    <clipPath id="oldclip"><rect x="40" y="100" width="500" height="300" rx="10"/></clipPath>
  </defs>

  <rect width="1120" height="470" fill="#EEF1F6"/>
  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A2233">主窗口 Main Window · 重构方案</text>
  <text x="40" y="70" font-size="13" fill="#6B7382">尺寸保持 500 × 300（不可缩放）。数据字段一一对应，无新增/删除，仅重排信息层级与视觉语言。</text>

  <!-- ===================== BEFORE ===================== -->
  <text x="40" y="94" font-size="13" font-weight="600" fill="#9AA3B2">当前 BEFORE</text>
  <g clip-path="url(#oldclip)" filter="url(#panel)">
    <rect x="40" y="100" width="500" height="300" fill="url(#oldbg)"/>
    <circle cx="120" cy="120" r="300" fill="#FFFFFF" opacity="0.10"/>
    <circle cx="90" cy="150" r="180" fill="#FFFFFF" opacity="0.08"/>
    <!-- big title -->
    <text x="66" y="186" font-size="34" font-weight="700" fill="#FFFFFF">打印服务已启动</text>
    <text x="430" y="180" font-size="20" fill="#FFFFFF" opacity="0.85">&#128065;</text>
    <!-- rows -->
    <text x="66" y="224" font-size="15" fill="#FFFFFF" opacity="0.95">服务地址：************************</text>
    <text x="66" y="248" font-size="13" fill="#FFFFFF" opacity="0.85">MAC地址：*****************</text>
    <text x="66" y="286" font-size="13" fill="#FFFFFF" opacity="0.85">中转状态: 未连接</text>
    <text x="320" y="286" font-size="13" fill="#FFFFFF" opacity="0.85">本地客户端：暂无连接</text>
    <text x="66" y="310" font-size="13" fill="#FFFFFF" opacity="0.85">打印状态：空闲</text>
    <text x="320" y="310" font-size="13" fill="#FFFFFF" opacity="0.85">设备编号：****************</text>
    <text x="66" y="334" font-size="13" fill="#FFFFFF" opacity="0.85">客户端版本：1.0.30</text>
  </g>
  <!-- before annotations -->
  <g font-size="11" fill="#B23B3B">
    <text x="66" y="372">· 50px 巨标题挤占空间，信息密度低</text>
    <text x="66" y="388">· 齿轮设置图标 hover 才出现，发现性差</text>
    <text x="300" y="372">· 色块 blob 背景观感陈旧、状态语义模糊</text>
    <text x="300" y="388">· 全部「标签：值」平铺，无层级与可点反馈</text>
  </g>

  <!-- ===================== AFTER ===================== -->
  <text x="580" y="94" font-size="13" font-weight="600" fill="#3358E0">重构后 AFTER</text>
  <g filter="url(#panel)">
    <rect x="580" y="100" width="500" height="300" rx="10" fill="#F4F6FA"/>
  </g>
  <g>
    <!-- top bar -->
    <path d="M580 110 a10 10 0 0 1 10 -10 h480 a10 10 0 0 1 10 10 v46 h-500 z" fill="#FFFFFF"/>
    <rect x="580" y="155" width="500" height="1" fill="#E6E9F0"/>
    <rect x="600" y="114" width="30" height="30" rx="8" fill="url(#brand)"/>
    <g stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="607" y="121" width="16" height="11" rx="2"/>
      <path d="M610 121 v-3 h10 v3"/>
      <rect x="610" y="127" width="10" height="6" fill="#FFFFFF" stroke="none"/>
    </g>
    <text x="640" y="134" font-size="15" font-weight="700" fill="#1A2233">hiPrint 打印服务</text>
    <!-- status pill -->
    <rect x="884" y="118" width="86" height="24" rx="12" fill="#E7F6EC"/>
    <circle cx="900" cy="130" r="4" fill="#16A34A"/>
    <text x="910" y="134" font-size="12" font-weight="600" fill="#16823C">运行中</text>
    <!-- eye + gear (always visible) -->
    <g stroke="#7A8396" stroke-width="1.7" fill="none" stroke-linecap="round">
      <path d="M988 130 c4 -6 12 -6 16 0 c-4 6 -12 6 -16 0 z"/>
      <circle cx="996" cy="130" r="2.4"/>
    </g>
    <g transform="translate(1040,130)" stroke="#7A8396" stroke-width="1.7" fill="none">
      <circle cx="0" cy="0" r="3.2"/>
      <path d="M0 -8 v3 M0 8 v-3 M-8 0 h3 M8 0 h-3 M-5.7 -5.7 l2.1 2.1 M5.7 5.7 l-2.1 -2.1 M5.7 -5.7 l-2.1 2.1 M-5.7 5.7 l2.1 -2.1" stroke-linecap="round"/>
    </g>

    <!-- service address card (hero) -->
    <rect x="600" y="172" width="460" height="60" rx="12" fill="#FFFFFF" filter="url(#card)"/>
    <rect x="600" y="172" width="4" height="60" rx="2" fill="#3358E0"/>
    <text x="618" y="195" font-size="11" font-weight="600" letter-spacing="1" fill="#9AA3B2">服务地址 SERVICE URL</text>
    <text x="618" y="217" font-size="17" font-weight="700" fill="#1A2233" font-family="'Cascadia Mono','Consolas',monospace">http://192.168.1.20:17521</text>
    <rect x="988" y="186" width="60" height="32" rx="8" fill="#EAF0FE"/>
    <g transform="translate(1004,196)" stroke="#3358E0" stroke-width="1.6" fill="none">
      <rect x="0" y="3" width="8" height="10" rx="2"/>
      <path d="M3 3 v-2 a2 2 0 0 1 2 -2 h6 a2 2 0 0 1 2 2 v8 a2 2 0 0 1 -2 2 h-1"/>
    </g>
    <text x="1024" y="206" font-size="12" font-weight="600" fill="#3358E0">复制</text>

    <!-- status tiles 2x2 -->
    <!-- tile1 中转状态 -->
    <rect x="600" y="244" width="224" height="46" rx="10" fill="#FFFFFF" filter="url(#card)"/>
    <circle cx="620" cy="267" r="5" fill="#C2C8D2"/>
    <text x="634" y="263" font-size="11" fill="#9AA3B2">中转状态</text>
    <text x="634" y="280" font-size="14" font-weight="600" fill="#1A2233">未连接</text>
    <!-- tile2 本地客户端 -->
    <rect x="836" y="244" width="224" height="46" rx="10" fill="#FFFFFF" filter="url(#card)"/>
    <circle cx="856" cy="267" r="5" fill="#16A34A"/>
    <text x="870" y="263" font-size="11" fill="#9AA3B2">本地客户端</text>
    <text x="870" y="280" font-size="14" font-weight="600" fill="#1A2233">已连接 2 条</text>
    <!-- tile3 打印状态 -->
    <rect x="600" y="296" width="224" height="46" rx="10" fill="#FFFFFF" filter="url(#card)"/>
    <circle cx="620" cy="319" r="5" fill="#C2C8D2"/>
    <text x="634" y="315" font-size="11" fill="#9AA3B2">打印状态</text>
    <text x="634" y="332" font-size="14" font-weight="600" fill="#1A2233">空闲</text>
    <!-- tile4 设备编号 -->
    <rect x="836" y="296" width="224" height="46" rx="10" fill="#FFFFFF" filter="url(#card)"/>
    <text x="856" y="315" font-size="11" fill="#9AA3B2">设备编号</text>
    <text x="856" y="332" font-size="14" font-weight="600" fill="#1A2233" font-family="'Cascadia Mono','Consolas',monospace">**** **** ****</text>
    <g transform="translate(1034,312)" stroke="#7A8396" stroke-width="1.5" fill="none">
      <rect x="0" y="3" width="7" height="9" rx="2"/>
      <path d="M2.5 3 v-2 a2 2 0 0 1 2 -2 h5 a2 2 0 0 1 2 2 v7 a2 2 0 0 1 -2 2 h-1"/>
    </g>

    <!-- footer -->
    <rect x="580" y="356" width="500" height="1" fill="#E6E9F0"/>
    <text x="600" y="378" font-size="11" fill="#9AA3B2">MAC  A1-B2-C3-D4-E5-F6</text>
    <text x="1060" y="378" font-size="11" fill="#9AA3B2" text-anchor="end">v1.0.30</text>
  </g>
  <!-- after annotations -->
  <g font-size="11" fill="#2E7D46">
    <text x="600" y="412">· 服务地址作为主卡片高亮 + 一键复制（最高频操作）</text>
    <text x="600" y="428">· 顶栏常驻状态药丸 + 设置/隐私按钮，状态一眼可见</text>
    <text x="600" y="444">· 状态以圆点语义色 + 卡片网格呈现，层级清晰、字段不减</text>
  </g>
</svg>
