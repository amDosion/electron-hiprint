    <rect x="64" y="208" width="992" height="30" fill="#FFFFFF" stroke="#EBEEF5"/>
    <text x="96" y="227">1</text><text x="184" y="227">2026/06/10 09:12:03</text><text x="300" y="227">本地</text>
    <text x="392" y="227">HP LaserJet</text><text x="492" y="227">tpl_001</text><text x="584" y="227">2页</text>
    <text x="660" y="227">成功</text><text x="800" y="227" fill="#9AA3B2">—</text>
    <text x="1000" y="227" fill="#C0C4CC">重打</text>
