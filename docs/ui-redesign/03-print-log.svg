    <text x="660" y="257" fill="#1A2233">失败</text><text x="800" y="257" fill="#1A2233" font-size="11">printer offline</text>
    <text x="1000" y="257" fill="#3358E0">重打</text>
    <rect x="64" y="268" width="992" height="30" fill="#FFFFFF" stroke="#EBEEF5"/>
    <text x="96" y="287">3</text><text x="184" y="287">2026/06/10 08:55:19</text><text x="300" y="287">本地</text>
    <text x="392" y="287">EPSON L3153</text><text x="492" y="287">tpl_087</text><text x="584" y="287">5页</text>
    <text x="660" y="287">成功</text><text x="800" y="287" fill="#9AA3B2">—</text>
    <text x="1000" y="287" fill="#3358E0">重打</text>
  </g>
  <text x="1040" y="420" font-size="12" fill="#5B6472" text-anchor="end">共 128 条  · 20/页  ‹ 1 2 3 ›</text>
  <text x="40" y="466" font-size="11" fill="#B23B3B">· 成功/失败为纯文字、无视觉区分；表头与数据对比弱；筛选与表格挤在同一视觉层</text>

