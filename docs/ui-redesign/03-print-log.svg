  <!-- pagination -->
  <text x="76" y="788" font-size="12" fill="#9AA3B2">共 128 条</text>
  <g font-size="12" text-anchor="middle">
    <text x="858" y="788" fill="#5B6472">20/页</text>
    <rect x="906" y="776" width="24" height="22" rx="6" fill="#FFFFFF" stroke="#E6E9F0"/><text x="918" y="791" fill="#5B6472">‹</text>
    <rect x="934" y="776" width="24" height="22" rx="6" fill="url(#l_brand)"/><text x="946" y="791" fill="#FFFFFF">1</text>
    <rect x="962" y="776" width="24" height="22" rx="6" fill="#FFFFFF" stroke="#E6E9F0"/><text x="974" y="791" fill="#5B6472">2</text>
    <rect x="990" y="776" width="24" height="22" rx="6" fill="#FFFFFF" stroke="#E6E9F0"/><text x="1002" y="791" fill="#5B6472">3</text>
    <rect x="1018" y="776" width="24" height="22" rx="6" fill="#FFFFFF" stroke="#E6E9F0"/><text x="1030" y="791" fill="#5B6472">›</text>
