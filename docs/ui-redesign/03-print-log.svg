    <!-- row2 failed -->
    <text x="96" y="700" fill="#9AA3B2">2</text>
    <text x="190" y="700" fill="#1A2233" font-family="monospace" font-size="11">06/10 09:08:41</text>
    <rect x="276" y="688" width="48" height="20" rx="10" fill="#FEF3E2"/><text x="300" y="702" fill="#B5740F" font-size="11">中转</text>
    <text x="392" y="700" fill="#1A2233">Canon G3800</text><text x="492" y="700" fill="#5B6472" font-family="monospace" font-size="11">tpl_204</text>
    <text x="580" y="700" fill="#1A2233">1</text>
    <rect x="638" y="688" width="44" height="20" rx="10" fill="#FDECEC"/><circle cx="652" cy="698" r="3" fill="#DC2626"/><text x="666" y="702" fill="#C0392B" font-size="11">失败</text>
    <text x="800" y="700" fill="#C0392B" font-size="11">printer offline</text>
    <rect x="982" y="690" width="44" height="22" rx="7" fill="#EAF0FE"/><text x="1004" y="705" fill="#3358E0" font-size="11">重打</text>
    <rect x="76" y="712" width="968" height="1" fill="#F2F4F8"/>
    <!-- row3 success -->
    <text x="96" y="736" fill="#9AA3B2">3</text>
    <text x="190" y="736" fill="#1A2233" font-family="monospace" font-size="11">06/10 08:55:19</text>
    <rect x="278" y="724" width="44" height="20" rx="10" fill="#EEF2FF"/><text x="300" y="738" fill="#3358E0" font-size="11">本地</text>
    <text x="392" y="736" fill="#1A2233">EPSON L3153</text><text x="492" y="736" fill="#5B6472" font-family="monospace" font-size="11">tpl_087</text>
    <text x="580" y="736" fill="#1A2233">5</text>
    <rect x="638" y="724" width="44" height="20" rx="10" fill="#E7F6EC"/><circle cx="652" cy="734" r="3" fill="#16A34A"/><text x="666" y="738" fill="#16823C" font-size="11">成功</text>
    <text x="800" y="736" fill="#C2C8D2">—</text>
    <rect x="982" y="726" width="44" height="22" rx="7" fill="#EAF0FE"/><text x="1004" y="741" fill="#3358E0" font-size="11">重打</text>
