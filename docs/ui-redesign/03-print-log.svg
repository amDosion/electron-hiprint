  <g filter="url(#l_panel)"><rect x="40" y="110" width="1040" height="330" rx="8" fill="#FFFFFF"/></g>
  <!-- filter row -->
  <g font-size="12" fill="#5B6472">
    <text x="64" y="146">时间：</text>
    <rect x="100" y="132" width="240" height="30" rx="4" fill="#FFFFFF" stroke="#DCDFE6"/>
    <text x="360" y="146">连接类型：</text>
    <rect x="424" y="132" width="120" height="30" rx="4" fill="#FFFFFF" stroke="#DCDFE6"/>
