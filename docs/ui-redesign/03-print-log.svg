<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="900" viewBox="0 0 1120 900" font-family="'Segoe UI','Microsoft YaHei','PingFang SC',system-ui,sans-serif">
  <defs>
    <filter id="l_panel" x="-5%" y="-8%" width="110%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#1A2233" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="l_brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F7BFF"/><stop offset="1" stop-color="#3358E0"/>
    </linearGradient>
  </defs>

  <rect width="1120" height="900" fill="#EEF1F6"/>
  <text x="40" y="46" font-size="22" font-weight="700" fill="#1A2233">打印日志 Print Log · 重构方案</text>
  <text x="40" y="70" font-size="13" fill="#6B7382">列、筛选、分页、重打逻辑全部保留；状态/类型改为语义色徽章，表头与筛选区做层级化处理。</text>

  <!-- ============ BEFORE ============ -->
