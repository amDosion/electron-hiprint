    <!-- row1 success -->
    <text x="96" y="664" fill="#9AA3B2">1</text>
    <text x="190" y="664" fill="#1A2233" font-family="monospace" font-size="11">06/10 09:12:03</text>
    <rect x="278" y="652" width="44" height="20" rx="10" fill="#EEF2FF"/><text x="300" y="666" fill="#3358E0" font-size="11">本地</text>
    <text x="392" y="664" fill="#1A2233">HP LaserJet</text><text x="492" y="664" fill="#5B6472" font-family="monospace" font-size="11">tpl_001</text>
    <text x="580" y="664" fill="#1A2233">2</text>
    <rect x="638" y="652" width="44" height="20" rx="10" fill="#E7F6EC"/><circle cx="652" cy="662" r="3" fill="#16A34A"/><text x="666" y="666" fill="#16823C" font-size="11">成功</text>
    <text x="800" y="664" fill="#C2C8D2">—</text>
    <text x="1004" y="664" fill="#C0C4CC">重打</text>
