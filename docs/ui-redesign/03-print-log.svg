  <!-- header -->
  <rect x="60" y="604" width="1000" height="36" rx="12" fill="#F7F9FC"/>
  <rect x="60" y="628" width="1000" height="12" fill="#F7F9FC"/>
  <g font-size="11" font-weight="600" fill="#9AA3B2" text-anchor="middle" letter-spacing="0.5">
