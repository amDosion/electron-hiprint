  <rect x="64" y="178" width="992" height="30" fill="#F5F7FA" stroke="#EBEEF5"/>
  <g font-size="12" fill="#5B6472" text-anchor="middle">
    <text x="96" y="198">序号</text><text x="184" y="198">时间</text><text x="300" y="198">连接类型</text>
    <text x="392" y="198">打印机</text><text x="492" y="198">模板 ID</text><text x="584" y="198">页数</text>
    <text x="660" y="198">状态</text><text x="800" y="198">错误信息</text><text x="1000" y="198">操作</text>
  </g>
  <!-- rows -->
