<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!--
      render 窗口经 app:// 加载（与 index/set/printLog/softwareLog 一致），插件经 Vite
      打包内联消费 @amdosion/vue3-print(ESM)，不再注入外部 runtime.js。
      hiprint 模板表达式依赖 new Function → 保留 'unsafe-eval'；模板图片可为远程/内联。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http: https:; font-src 'self' data:; connect-src 'self'; media-src 'self' data: blob: http: https:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
    <title>打印窗口</title>
  </head>

  <body>
    <div id="printElement"></div>
    <script type="module" src="./app/windows/render/main.ts"></script>
  </body>
</html>
