<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' file:; style-src 'self' 'unsafe-inline' file: data:; img-src 'self' data: blob: file: http: https:; font-src 'self' data: file:; connect-src 'self' data: blob: file: http: https:; media-src 'self' data: blob: file: http: https:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
    <title>打印窗口</title>
  </head>

  <body>
    <div id="printElement"></div>
    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../node_modules/nzh/dist/nzh.min.js"></script>
    <script src="../node_modules/bwip-js/dist/bwip-js.js"></script>
    <script src="../node_modules/jsbarcode/dist/JsBarcode.all.min.js"></script>
    <script>
      const ipc = window.hiprintRender;
      window.autoConnect = false;
      window.process = window.process || { env: {} };
      window.process.env = window.process.env || {};
      window.process.env.NODE_ENV = window.process.env.NODE_ENV || "production";
      window["bwip-js"] = window.bwipjs;
      window.template = undefined;
      window.io = () => {};

      // 用于判断是否为打包版本
      const isPackaged = location.href.includes("app.asar");
      const pluginVersion = ipc.pluginVersion;
      const pluginBaseUrl = isPackaged ? "../../plugin" : "../plugin";

      // 获取模板json. string或者json 统一处理
      const getTemplateJson = (val) => {
        try {
          let template = val;
          if ("string" == typeof template) {
            template = JSON.parse(template);
          }
          if ("object" != typeof template) {
            throw new Error("模板格式错误");
          }
          if (template.panels && template.panels.length === 0) {
            throw new Error("模板格式错误");
          }
          return template;
        } catch (error) {
          ipc.send("showMessageBox", {
            title: "模板格式错误",
            message: `请传入正确的模板json`,
            type: "error",
            buttons: ["我知道了"],
          });
        }
      };

      function sanitizeNode(root) {
        root.querySelectorAll("script").forEach((node) => node.remove());
        // 移除 SVG <foreignObject>（可内嵌任意可执行 HTML）
        root.querySelectorAll("foreignObject").forEach((node) => node.remove());
        root.querySelectorAll("*").forEach((node) => {
          Array.from(node.attributes).forEach((attribute) => {
            const name = attribute.name;
            // 移除事件处理属性
            if (/^on/i.test(name)) {
              node.removeAttribute(name);
              return;
            }
            // 移除 javascript: 协议的 href/src/xlink:href 等属性
            const value = (attribute.value || "")
              .replace(/[\x00-\x20]+/g, "")
              .toLowerCase();
            if (
              /^(href|xlink:href|src|action|formaction|data|background)$/i.test(
                name,
              ) &&
              value.startsWith("javascript:")
            ) {
              node.removeAttribute(name);
            }
          });
        });
      }

      function normalizeHtmlContent(html) {
        if (html && html.jquery) {
          return Array.from(html).map((node) => node.outerHTML || "").join("");
        }
        if (Array.isArray(html)) {
          return html.map((item) => normalizeHtmlContent(item)).join("");
        }
        if (html && html.outerHTML) {
          return html.outerHTML;
        }
        return String(html || "");
      }

      function setPrintElementContent(html) {
        const template = document.createElement("template");
        template.innerHTML = normalizeHtmlContent(html);
        sanitizeNode(template.content);
        const printElement = document.getElementById("printElement");
        printElement.replaceChildren(...Array.from(template.content.childNodes));
        return printElement;
      }

      $(document).ready(function() {
        const script = document.createElement("script");
        script.setAttribute("type", "text/javascript");

        // 加载插件
        const scriptSrc = `${pluginBaseUrl}/${pluginVersion}_vue-plugin-hiprint.js`;

        script.setAttribute("src", scriptSrc);
        script.onload = () => {
          const pluginGlobal =
            window["vue-plugin-hiprint"] ||
            window.VuePluginHiprint ||
            window["@amdosion/vue3-print"] ||
            window.Vue3Print;
          if (!pluginGlobal || !pluginGlobal.hiprint) {
            ipc.send("showMessageBox", {
              title: "插件加载错误",
              message: `【${pluginVersion}】版本未暴露 hiprint，请升级客户端或重新启动后重试！`,
              type: "error",
              buttons: ["我知道了"],
            });
            return;
          }
          hiprint = pluginGlobal.hiprint;

          ipc.on("png", (data) => {
            // 滚动窗口滚动条到左上角
            window.scrollTo(0, 0);
            let html = data.html;
            if (data.template) {
              window.template = new hiprint.PrintTemplate({
                template: data.template,
              });
              html = window.template.getHtml(data.data);
            }
            const printElement = $(setPrintElementContent(html));
            const rects = Array.from(
              printElement.find(".hiprint-printPaper"),
            ).map((el) => el.getBoundingClientRect());
            const capturePageData = {
              ...data,
              templateId: data.templateId || template.id,
              x: rects[0].x,
              y: rects[0].y,
              width: rects[0].width,
              height: rects.pop().bottom,
            };
            setTimeout(() => {
              ipc.send("capturePage", capturePageData);
            });
          });

          ipc.on("pdf", (data) => {
            let html = data.html;
            if (data.template) {
              let template = getTemplateJson(data.template);
              window.template = new hiprint.PrintTemplate({
                template: template,
              });
              html = window.template.getHtml(data.data);
            }
            setPrintElementContent(html);
            setTimeout(() => {
              ipc.send("printToPDF", {
                ...data,
                templateId: data.templateId || template.id,
              });
            });
          });

          ipc.on("print", (data) => {
            let html = data.html;
            if (data.template) {
              let template = getTemplateJson(data.template);
              window.template = new hiprint.PrintTemplate({
                template: template,
              });
              html = window.template.getHtml(data.data);
            }
            const printElement = setPrintElementContent(html);
            setTimeout(() => {
              ipc.send("print", {
                ...data,
                html: printElement.firstElementChild
                  ? printElement.firstElementChild.innerHTML
                  : printElement.innerHTML,
                templateId: data.templateId || template.id,
                pageNum: $("#printElement .hiprint-printPaper").length,
              });
            });
          });
        };
      script.onerror = () => {
        ipc.send("showMessageBox", {
          title: "插件加载错误",
          message: `无法从插件缓存中加载【${pluginVersion}】版本，请升级客户端或重新启动后重试！`,
            type: "error",
            buttons: ["我知道了"],
          });
        };

        const head = document.querySelector("head");

        const styleFile = `${pluginVersion}_style.css`;
        head.append(
          $(
            `<link rel="stylesheet" type="text/css" href="${pluginBaseUrl}/${styleFile}">`,
          )[0],
        );

        const cssSrc = `${pluginBaseUrl}/${pluginVersion}_print-lock.css`;

        head.append(
          $(
            `<link rel="stylesheet" type="text/css" media="print" href="${cssSrc}">`,
          )[0],
        );
        head.append(script);
      });
    </script>
  </body>
</html>
