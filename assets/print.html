<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' file:; style-src 'self' 'unsafe-inline' file: data:; img-src 'self' data: blob: file: http: https:; font-src 'self' data: file:; connect-src 'self' data: blob: file: http: https:; media-src 'self' data: blob: file: http: https:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>打印窗口</title>
    <link href="./css/print-lock.css" rel="stylesheet" />
    <link href="./css/print-lock.css" media="print" rel="stylesheet" />
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>

  <body>
    <div id="printElement"></div>
    <script>
      const printApi = window.hiprintPrint;

      function sanitizeNode(root) {
        root.querySelectorAll("script").forEach((node) => node.remove());
        // 移除 SVG <foreignObject>（可内嵌任意可执行 HTML）
        root.querySelectorAll("foreignObject").forEach((node) => node.remove());
        root.querySelectorAll("*").forEach((node) => {
          Array.from(node.attributes).forEach((attribute) => {
            const name = attribute.name;
            // 移除事件处理属性
            if (/^on/i.test(name)) {
              node.removeAttribute(name);
              return;
            }
            // 移除 javascript: 协议的 href/src/xlink:href 等属性
            const value = (attribute.value || "")
              .replace(/[\x00-\x20]+/g, "")
              .toLowerCase();
            if (
              /^(href|xlink:href|src|action|formaction|data|background)$/i.test(
                name,
              ) &&
              value.startsWith("javascript:")
            ) {
              node.removeAttribute(name);
            }
          });
        });
      }

      function setPrintHtml(target, html) {
        const template = document.createElement("template");
        template.innerHTML = String(html || "");
        sanitizeNode(template.content);
        target.replaceChildren(...Array.from(template.content.childNodes));
      }

      function getUrl(str) {
        const reg = /(https?|http|ftp|file):\/\/[-A-Za-z0-9+&@#/%?=~_|!:,.;]+[-A-Za-z0-9+&@#/%=~_|]/g;
        const value = String(str || "").match(reg);
        return value && value.length ? value[0] : "";
      }

      function waitForImages(callback) {
        const images = Array.from(document.querySelectorAll("img"));
        let remaining = images.length;
        const done = () => {
          remaining -= 1;
          if (remaining <= 0) callback();
        };
        if (remaining <= 0) {
          callback();
          return;
        }
        images.forEach((element) => {
          const image = new Image();
          let src = element.getAttribute("src") || "";
          if (!new RegExp("[a-zA-Z]+://[^\\s]*").test(src)) {
            src = getUrl(element.getAttribute("style") || "");
          }
          image.src = src;
          if (image.complete || src === "") {
            done();
          } else {
            image.onload = done;
            image.onerror = done;
          }
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        printApi.onPrintNew((data) => {
          document.title = data.title ? data.title : "hiprint打印";
          setPrintHtml(document.getElementById("printElement"), data.html);
          data.pageNum = document.querySelectorAll(".hiprint-printPaper").length;
          waitForImages(() => {
            printApi.done(data);
          });
        });
        printApi.onReprint((data) => {
          document.title = data.title ? data.title : "hiprint打印";
          setPrintHtml(document.getElementById("printElement"), data.html);
          waitForImages(() => {
            printApi.done(data);
          });
        });
      });
    </script>
  </body>
</html>
