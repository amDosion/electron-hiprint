name: Release Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    # GitHub Actions tag patterns are globs, not regular expressions.
    # check-version below performs the strict package.json/tag equality check.
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*-beta[0-9]*"

permissions: write-all

concurrency:
  group: "${{ github.workflow }} - ${{ github.head_ref || github.ref }}"
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  check-version:
    name: 校验版本号
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 校验 package.json version 与 tag 一致
        run: |
          TAG_NAME="${GITHUB_REF##refs/tags/}"
          PKG_VERSION=$(jq -r .version package.json)
          if [[ "$PKG_VERSION" != "$TAG_NAME" ]]; then
            echo "❌ package.json 里的 version ($PKG_VERSION) 和 tag ($TAG_NAME) 不一致，终止执行。"
            exit 1
          fi
          echo "✅ package.json 里的 version 和 tag ($TAG_NAME) 一致，继续执行。"

  build:
    name: 打包
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build-w-64
            artifact: win_x64
          - os: windows-latest
            script: build-w
            artifact: win_x32
          - os: macos-15
            script: build-m-arm64
            artifact: mac_arm64
          - os: macos-15-intel
            script: build-m
            artifact: mac_x64
          - os: macos-15
            script: build-m-universal
            artifact: mac_universal
          - os: ubuntu-latest
            script: build-l
            artifact: linux_64
          - os: ubuntu-latest
            script: build-l-arm64
            artifact: linux_arm64
          - os: ubuntu-latest
            script: build-kylin
            artifact: Kylin_64

    runs-on: ${{ matrix.os }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: 设置 macOS node-gyp Python
        if: runner.os == 'macOS'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: npm ci

      - name: 打包 ${{ matrix.artifact }}
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 校验安装包产物
        shell: pwsh
        run: |
          $artifact = "${{ matrix.artifact }}"
          $prefix = "hiprint_$artifact-"
          $files = Get-ChildItem -Path out -File | Where-Object { $_.Name.StartsWith($prefix) }
          if ($files.Count -eq 0) {
            throw "No installer files found for $artifact"
          }
          if ($artifact.StartsWith("win_")) {
            if (-not ($files | Where-Object { $_.Name.EndsWith(".exe") })) { throw "Missing Windows exe for $artifact" }
            if (-not ($files | Where-Object { $_.Name.EndsWith(".exe.blockmap") })) { throw "Missing Windows blockmap for $artifact" }
          } elseif ($artifact.StartsWith("mac_")) {
            if (-not ($files | Where-Object { $_.Name.EndsWith(".dmg") })) { throw "Missing macOS dmg for $artifact" }
          } else {
            if (-not ($files | Where-Object { $_.Name.EndsWith(".tar.xz") })) { throw "Missing Linux tar.xz for $artifact" }
            if (-not ($files | Where-Object { $_.Name.EndsWith(".deb") })) { throw "Missing Linux deb for $artifact" }
          }

      - name: 上传构建产物
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            out/hiprint_${{ matrix.artifact }}-*.exe
            out/hiprint_${{ matrix.artifact }}-*.exe.blockmap
            out/hiprint_${{ matrix.artifact }}-*.dmg
            out/hiprint_${{ matrix.artifact }}-*.tar.xz
            out/hiprint_${{ matrix.artifact }}-*.deb
          if-no-files-found: error
          retention-days: 7

  release:
    name: 自动发布 Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 获取当前日期
        run: echo "RELEASE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: 下载 win64 产物
        uses: actions/download-artifact@v6
        with:
          name: win_x64
          path: artifacts/win

      - name: 下载 win32 产物
        uses: actions/download-artifact@v6
        with:
          name: win_x32
          path: artifacts/win

      - name: 下载 mac ARM64 产物
        uses: actions/download-artifact@v6
        with:
          name: mac_arm64
          path: artifacts/mac

      - name: 下载 mac x64 产物
        uses: actions/download-artifact@v6
        with:
          name: mac_x64
          path: artifacts/mac

      - name: 下载 mac Universal 产物
        uses: actions/download-artifact@v6
        with:
          name: mac_universal
          path: artifacts/mac

      - name: 下载 linux x64 产物
        uses: actions/download-artifact@v6
        with:
          name: linux_64
          path: artifacts/linux

      - name: 下载 linux ARM64 产物
        uses: actions/download-artifact@v6
        with:
          name: linux_arm64
          path: artifacts/linux

      - name: 下载 Kylin 产物
        uses: actions/download-artifact@v6
        with:
          name: Kylin_64
          path: artifacts/linux

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} (${{ env.RELEASE_DATE }})
          draft: false
          generate_release_notes: true
          body: |
            Github Actions 自动发布的 Release

            > [!IMPORTANT]
            > macOS 提示应用程序已经损坏，解决方案
            >
            > [文件提示损坏解决办法 macwk.cn](https://macwk.cn/1144.html)
            > `sudo xattr -r -d com.apple.quarantine /应用程序路径/hiprint.app`
          files: |
            artifacts/win/**
            artifacts/mac/**
            artifacts/linux/**
          prerelease: ${{ contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
