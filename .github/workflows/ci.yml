name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master, main, "codex/**"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax:
    name: Syntax checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Check JavaScript syntax
        run: |
          node --check main.js
          node --check start.js
          node --check src/deferred-installer-launcher.js
          node --check src/online-update.js
          node --check src/online-upgrade-runner.js
          node --check src/software-log-store.js
          node --check src/set.js
          node --check tools/database.js
          node --check tools/utils.js
          node --check build/write-build-info.js
          node --check tools/repro/runtime/packaged-main-startup-log-check.js
          node --check tools/repro/runtime/software-log-sqlite-contract-check.js
          node --check tools/repro/updater/github-online-upgrade-check.js
          pwsh -NoProfile -Command "[scriptblock]::Create((Get-Content -Raw tools/repro/updater/installed-upgrade-smoke.ps1)) | Out-Null"
